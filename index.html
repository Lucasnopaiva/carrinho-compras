<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Login | Carrinho de compras</title>
</head>

<body class="pagina-login">
  <section id="tela-carregamento" class="tela-carregamento oculto" aria-live="polite" aria-label="Carregando">
    <div class="tela-carregamento__caixa">
      <span class="tela-carregamento__spinner"></span>
      <p class="tela-carregamento__texto">Entrando na sua conta...</p>
    </div>
  </section>

  <section id="login-area" class="login-card">
    <h1 class="login-titulo">Acesse sua conta</h1>
    <p class="login-texto">Entre para abrir seu carrinho e continuar as compras.</p>

    <input type="email" id="email" placeholder="Seu email">
    <input type="password" id="senha" placeholder="Sua senha">

    <button type="button" id="botao-entrar" class="botao-form botao-adicionar" onclick="fazerLogin()">Entrar</button>
    <p id="mensagem-login" class="mensagem-login"></p>
    <section id="painel-erro" class="painel-erro oculto">
      <h2 class="painel-erro__titulo">Erro encontrado</h2>
      <p id="mensagem-erro-detalhe" class="painel-erro__texto"></p>
    </section>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
</body>

</html>
